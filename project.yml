name: Flexpond
options:
  bundleIdPrefix: com.flexpond
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  FlexpondCore:
    path: FlexpondCore

targets:
  Flexpond:
    type: application
    platform: iOS
    sources:
      - path: Flexpond/App
      - path: Flexpond/Theme
      - path: Flexpond/Views
    dependencies:
      - package: FlexpondCore
        product: FlexpondCore
    info:
      path: Flexpond/App/Info.plist
      properties:
        CFBundleDisplayName: "Flexpönd"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flexpond.app
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: "YES"
